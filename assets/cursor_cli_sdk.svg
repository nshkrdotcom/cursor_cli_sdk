<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <clipPath id="hexClip">
      <polygon points="100,4 183.14,52 183.14,148 100,196 16.86,148 16.86,52"/>
    </clipPath>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07120f"/>
      <stop offset="45%" stop-color="#0d2523"/>
      <stop offset="100%" stop-color="#151927"/>
    </linearGradient>
    <linearGradient id="rim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#55f0c8"/>
      <stop offset="50%" stop-color="#7aa7ff"/>
      <stop offset="100%" stop-color="#f2f7ff"/>
    </linearGradient>
    <linearGradient id="cursor" x1="36%" y1="18%" x2="72%" y2="78%">
      <stop offset="0%" stop-color="#f9fffe"/>
      <stop offset="52%" stop-color="#baf7eb"/>
      <stop offset="100%" stop-color="#55f0c8"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#55f0c8"/>
      <stop offset="100%" stop-color="#7aa7ff"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#55f0c8" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#55f0c8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="fineGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <polygon points="100,4 183.14,52 183.14,148 100,196 16.86,148 16.86,52"
           fill="url(#bg)" stroke="url(#rim)" stroke-width="2.5" stroke-linejoin="round"/>

  <g clip-path="url(#hexClip)">
    <ellipse cx="100" cy="84" rx="72" ry="62" fill="url(#halo)" filter="url(#softGlow)"/>

    <g opacity="0.11" stroke="#baf7eb" stroke-width="0.55">
      <path d="M36 64H164"/>
      <path d="M30 92H170"/>
      <path d="M36 120H164"/>
      <path d="M58 42V154"/>
      <path d="M100 25V177"/>
      <path d="M142 42V154"/>
    </g>

    <g fill="none" stroke="#55f0c8" stroke-linecap="round" opacity="0.35">
      <path d="M42 62h32m12 0h14m20 0h38" stroke-width="1"/>
      <path d="M48 140h26m18 0h48" stroke-width="1"/>
      <path d="M62 156h76" stroke-width="0.9"/>
    </g>

    <g transform="translate(43 41)" filter="url(#fineGlow)">
      <path d="M28 6l70 56-36 7 25 42-18 10-24-42-24 28z"
