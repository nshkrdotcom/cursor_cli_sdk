            stroke-linejoin="round"/>
      <path d="M54 55l-15 31 8-42 34 27z" fill="#07120f" opacity="0.28"/>
    </g>

    <g transform="translate(51 135)" filter="url(#fineGlow)">
      <rect x="0" y="0" width="98" height="30" rx="7" fill="#07120f" opacity="0.72"
            stroke="#55f0c8" stroke-opacity="0.45"/>
      <path d="M16 9l9 6-9 6" fill="none" stroke="url(#terminal)" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="36" y1="21" x2="70" y2="21" stroke="#7aa7ff" stroke-width="2.6"
            stroke-linecap="round"/>
      <circle cx="84" cy="15" r="2.1" fill="#55f0c8"/>
    </g>

    <g opacity="0.5" fill="#f2f7ff" filter="url(#fineGlow)">
      <circle cx="43" cy="81" r="1.3"/>
      <circle cx="152" cy="76" r="1.1"/>
      <circle cx="152" cy="121" r="1.4"/>
      <circle cx="71" cy="31" r="1"/>
      <circle cx="127" cy="169" r="1"/>
    </g>
  </g>
